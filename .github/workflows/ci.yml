name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Rust – lint, test, build
  # -----------------------------------------------------------------------
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev nettle-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Build release
        run: cargo build --workspace --release

  # -----------------------------------------------------------------------
  # Python – lint (ruff + mypy)
  # -----------------------------------------------------------------------
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check python tests

      - name: Ruff format check
        run: ruff format --check python tests

      - name: Mypy
        run: mypy python/hb_zayfer || true  # advisory until baseline established

  # -----------------------------------------------------------------------
  # Python – build native module, run pytest
  # -----------------------------------------------------------------------
  python:
    name: Python (${{ matrix.os }}, ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev nettle-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-py-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-py-cargo-

      - name: Install maturin & Python deps
        run: |
          pip install --upgrade pip
          pip install maturin[patchelf] pytest pytest-asyncio pytest-qt httpx fastapi uvicorn python-multipart PySide6 ruff mypy

      - name: Build native module (develop)
        run: maturin develop --release

      - name: Ruff lint
        run: ruff check python/ tests/

      - name: Ruff format check
        run: ruff format --check python/ tests/

      - name: Mypy type-check
        run: mypy python/hb_zayfer

      - name: Web app smoke test
        run: |
          python - <<'PY'
          from hb_zayfer.web.app import create_app
          app = create_app()
          print(app.title, app.version)
          PY

      - name: GUI smoke test
        env:
          QT_QPA_PLATFORM: offscreen
          HB_ZAYFER_SKIP_ONBOARDING: "1"
        run: |
          python - <<'PY'
          from PySide6.QtWidgets import QApplication
          from hb_zayfer.gui.main_window import MainWindow

          app = QApplication([])
          win = MainWindow()
          print(win.windowTitle())
          win.close()
          app.quit()
          PY

      - name: Run Python tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/python/ -v --tb=short

  # -----------------------------------------------------------------------
  # WASM – verify wasm crate builds
  # -----------------------------------------------------------------------
  wasm:
    name: WASM build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-wasm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-cargo-

      - name: Build WASM crate
        run: cargo build -p hb_zayfer_wasm --target wasm32-unknown-unknown --release

  # -----------------------------------------------------------------------
  # Security audit – check for known vulnerabilities
  # -----------------------------------------------------------------------
  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Run audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked || true

      - name: Run cargo-deny (advisories, licenses, bans, sources)
        run: cargo deny check
